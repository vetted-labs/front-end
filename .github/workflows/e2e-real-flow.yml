name: E2E Real Flow

on:
  pull_request:
    paths:
      - "e2e/real-flow/**"
      - "src/lib/api.ts"
      - ".github/workflows/e2e-real-flow.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # This real-flow E2E needs to check out the PRIVATE backend +
  # smart-contracts repos, but it runs in the PUBLIC front-end repo. The
  # default GITHUB_TOKEN is scoped to this repo only and cannot read them,
  # so a dedicated `SIBLING_REPOS_TOKEN` secret (a fine-scoped PAT or
  # GitHub App token with read access to vetted-labs/backend +
  # vetted-labs/smart-contracts) is required.
  #
  # SECURITY: prefer a GitHub App / short-lived token. A long-lived PAT in
  # a public repo is exposed to same-repo PR authors — consider relocating
  # this workflow to the private backend repo instead.
  #
  # When the secret is absent we SKIP (not fail) so the check stays green.
  # ------------------------------------------------------------------
  preflight:
    name: Preflight (cross-repo token)
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          SIBLING_REPOS_TOKEN: ${{ secrets.SIBLING_REPOS_TOKEN }}
        run: |
          if [ -n "$SIBLING_REPOS_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SIBLING_REPOS_TOKEN not configured — skipping real-flow E2E. Add a token with read access to the private backend + smart-contracts repos to enable it."
          fi

  e2e-real-flow:
    name: Real Flow E2E
    needs: preflight
    if: needs.preflight.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vetted
          POSTGRES_PASSWORD: vetted
          POSTGRES_DB: vetted_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Local anvil RPC
      RPC_URL: http://127.0.0.1:8545
      ANVIL_MNEMONIC: "test test test test test test test test test test test junk"
      # Backend listens on :4000 in CI (overrides the dev-tuned PORT in .env.e2e)
      BACKEND_URL: http://127.0.0.1:4000
      PORT: "4000"
      NODE_ENV: test
      E2E_FIXTURE_ENABLED: "true"
      ENDORSEMENT_RETENTION_SECONDS: "5"
      ENDORSEMENT_CHALLENGE_SECONDS: "10"
      # DB — override the dev values in backend/.env.e2e to point at the
      # CI postgres service (dotenv does not override existing env vars).
      PGHOST: 127.0.0.1
      PGPORT: "5432"
      PGUSER: vetted
      PGPASSWORD: vetted
      PGDATABASE: vetted_e2e
      DATABASE_URL: postgresql://vetted:vetted@127.0.0.1:5432/vetted_e2e
      # Frontend (build-time placeholders)
      NEXT_PUBLIC_API_URL: http://127.0.0.1:4000
      NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: dummy-ci-value
      NEXT_PUBLIC_LINKEDIN_CLIENT_ID: dummy-ci-value

    steps:
      # --- Checkout the three repos (front-end public; the others private) ---
      - name: Checkout front-end
        uses: actions/checkout@v4
        with:
          path: front-end

      - name: Checkout backend (private)
        uses: actions/checkout@v4
        with:
          repository: vetted-labs/backend
          path: backend
          token: ${{ secrets.SIBLING_REPOS_TOKEN }}

      - name: Checkout smart-contracts (private)
        uses: actions/checkout@v4
        with:
          repository: vetted-labs/smart-contracts
          path: smart-contracts
          token: ${{ secrets.SIBLING_REPOS_TOKEN }}

      # --- Toolchains ---
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      # --- Local chain ---
      - name: Start anvil
        run: |
          anvil \
            --host 127.0.0.1 \
            --port 8545 \
            --block-time 1 \
            --mnemonic "$ANVIL_MNEMONIC" \
            > anvil.log 2>&1 &
          echo "ANVIL_PID=$!" >> "$GITHUB_ENV"
          for _ in {1..30}; do
            if curl -s -X POST -H "Content-Type: application/json" \
              --data '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
              "$RPC_URL" | grep -q result; then
              echo "anvil is up"; break
            fi
            sleep 1
          done

      - name: Derive deployer key from anvil mnemonic
        run: |
          KEY=$(cast wallet private-key "$ANVIL_MNEMONIC" "m/44'/60'/0'/0/0")
          echo "::add-mask::$KEY"
          echo "DEPLOYER_PRIVATE_KEY=$KEY" >> "$GITHUB_ENV"

      # --- Deploy contracts ---
      - name: Deploy core contracts
        working-directory: smart-contracts
        run: |
          forge script script/Deploy.s.sol \
            --rpc-url "$RPC_URL" \
            --private-key "$DEPLOYER_PRIVATE_KEY" \
            --broadcast \
            --json | tee deploy.out

      - name: Export deployed addresses
        working-directory: smart-contracts
        run: |
          # Deploy.s.sol writes deployments/local-latest.json (verified key names).
          DEPLOY_FILE="deployments/local-latest.json"
          if [ ! -f "$DEPLOY_FILE" ]; then
            echo "::error::Expected $DEPLOY_FILE after Deploy.s.sol"
            exit 1
          fi
          {
            echo "VETTED_TOKEN_ADDRESS=$(jq -r .VettedToken       "$DEPLOY_FILE")"
            echo "GUILD_REGISTRY_ADDRESS=$(jq -r .GuildRegistry    "$DEPLOY_FILE")"
            echo "REPUTATION_ADDRESS=$(jq -r .ReputationManager    "$DEPLOY_FILE")"
            echo "STAKING_ADDRESS=$(jq -r .ExpertStaking           "$DEPLOY_FILE")"
          } >> "$GITHUB_ENV"

      - name: Setup testing guild
        working-directory: smart-contracts
        run: |
          forge script script/SetupTestingGuild.s.sol \
            --rpc-url "$RPC_URL" \
            --private-key "$DEPLOYER_PRIVATE_KEY" \
            --broadcast

      - name: Skip mint rate-limit cooldown
        run: |
          cast rpc evm_increaseTime 86401 --rpc-url "$RPC_URL"
          cast rpc evm_mine          --rpc-url "$RPC_URL"

      - name: Mint test tokens
        working-directory: smart-contracts
        run: |
          forge script script/MintTokens.s.sol \
            --rpc-url "$RPC_URL" \
            --private-key "$DEPLOYER_PRIVATE_KEY" \
            --broadcast

      # --- Backend ---
      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Reset + migrate the E2E database
        working-directory: backend
        run: npm run db:e2e:reset

      - name: Start backend (e2e)
        working-directory: backend
        env:
          RPC_URL: ${{ env.RPC_URL }}
          VETTED_TOKEN_ADDRESS: ${{ env.VETTED_TOKEN_ADDRESS }}
          GUILD_REGISTRY_ADDRESS: ${{ env.GUILD_REGISTRY_ADDRESS }}
          REPUTATION_ADDRESS: ${{ env.REPUTATION_ADDRESS }}
          STAKING_ADDRESS: ${{ env.STAKING_ADDRESS }}
        run: |
          # dev:e2e loads .env.e2e via dotenv; our job-level env overrides the
          # dev-only DB host/port/user and PORT so it targets the CI services.
          npm run dev:e2e > backend.log 2>&1 &
          echo "BACKEND_PID=$!" >> "$GITHUB_ENV"
          for _ in {1..60}; do
            if curl -s "$BACKEND_URL/health" | grep -q ok; then
              echo "backend is up"; break
            fi
            sleep 1
          done

      # --- Seed Suite B fixtures (E2E_FIXTURE_ENABLED gates these routes) ---
      - name: Bootstrap Suite B tokens
        run: |
          set -euo pipefail
          COMPANY_RES=$(curl -sS -X POST -H "Content-Type: application/json" \
            -d '{"suite":"B"}' "$BACKEND_URL/api/test/seed/company")
          COMPANY_TOKEN=$(echo "$COMPANY_RES" | jq -r .token)
          if [ -z "$COMPANY_TOKEN" ] || [ "$COMPANY_TOKEN" = "null" ]; then
            echo "::error::seed/company did not return a token: $COMPANY_RES"; exit 1
          fi
          EXPERT_RES=$(curl -sS -X POST -H "Content-Type: application/json" \
            -d '{"suite":"B"}' "$BACKEND_URL/api/test/seed/expert-token")
          EXPERT_TOKENS=$(echo "$EXPERT_RES" | jq -c .tokens)
          if [ -z "$EXPERT_TOKENS" ] || [ "$EXPERT_TOKENS" = "null" ]; then
            echo "::error::seed/expert-token did not return tokens: $EXPERT_RES"; exit 1
          fi
          {
            echo "E2E_COMPANY_TOKEN=$COMPANY_TOKEN"
            echo "E2E_EXPERT_TOKENS=$EXPERT_TOKENS"
          } >> "$GITHUB_ENV"

      # --- Frontend + Playwright ---
      - name: Install frontend deps
        working-directory: front-end
        run: npm ci

      - name: Install Playwright browsers
        working-directory: front-end
        run: npx playwright install --with-deps chromium

      - name: Write .env.local for the real-flow runner
        working-directory: front-end
        # The `e2e:real-flow` script loads .env.local via dotenv; synthesize it
        # from the CI env so the runner points at the local backend.
        run: |
          cat > .env.local <<EOF
          NEXT_PUBLIC_API_URL=${BACKEND_URL}
          NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID=dummy-ci-value
          NEXT_PUBLIC_LINKEDIN_CLIENT_ID=dummy-ci-value
          EOF

      - name: Verify regression specs are discoverable
        working-directory: front-end
        run: npm run test:verify-regression-specs

      - name: Run real-flow E2E
        working-directory: front-end
        env:
          E2E_COMPANY_TOKEN: ${{ env.E2E_COMPANY_TOKEN }}
          E2E_EXPERT_TOKENS: ${{ env.E2E_EXPERT_TOKENS }}
          RPC_URL: ${{ env.RPC_URL }}
        run: npm run e2e:real-flow

      # --- Artefacts (failure only) ---
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-real-flow
          path: front-end/playwright-report-real-flow
          retention-days: 14

      - name: Upload service logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: service-logs
          path: |
            anvil.log
            backend/backend.log
          retention-days: 14
