<!DOCTYPE html>
<html><head><title>Pattern Tiling Final Test</title></head>
<body style="background:#1a1612;padding:20px;color:white;font-family:sans-serif">

<h3>Mirrored tiling (seamless — no seams at tile boundaries)</h3>
<div style="width:100%;height:700px;position:relative;border:1px solid #444">
  <div style="position:absolute;inset:0;background-image:url(/public/pattern-mirrored.svg);background-size:1080px 1080px;background-repeat:repeat;filter:invert(1);mix-blend-mode:screen;opacity:0.35"></div>
</div>

<h3 style="margin-top:30px">Original tiling (has seams — for comparison)</h3>
<div style="width:100%;height:700px;position:relative;border:1px solid #444">
  <div style="position:absolute;inset:0;background-image:url(/public/pattern-square-nologo.svg);background-size:1080px 1080px;background-repeat:repeat;filter:invert(1);mix-blend-mode:screen;opacity:0.35"></div>
</div>

<h3 style="margin-top:30px">Light mode — mirrored tiling</h3>
<div style="width:100%;height:700px;position:relative;border:1px solid #ddd;background:#faf9f7">
  <div style="position:absolute;inset:0;background-image:url(/public/pattern-mirrored.svg);background-size:1080px 1080px;background-repeat:repeat;mix-blend-mode:multiply;opacity:0.35"></div>
</div>
</body>
</html>
